<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>memo</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="memo">
<link rel="manifest" href="/manifest.json">
<style>
:root {
  --bg:#F5F0E8;--surface:#FFFCF7;--border:#E2D9C8;
  --text:#3A2E1E;--muted:#9A8E7A;--accent:#8B6340;--accent2:#C4956A;
  --accent-light:#F5EAD8;--tag-bg:#EDE5D8;
  --sb-bg:#2C2018;--sb-text:#C8B89A;--sb-active:#8B6340;
  --title-color:#6B4A28;--title-bg:#EDE0CC;
  --sb-w:220px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sb-w);min-width:var(--sb-w);
  background:var(--sb-bg);display:flex;flex-direction:column;
  height:100dvh;overflow:hidden;flex-shrink:0;
}
.sb-header{padding:18px 14px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.06);}
.sb-title{font-size:18px;font-weight:800;color:#FFF8F0;}
.sb-add-btn{background:rgba(255,255,255,0.1);border:none;border-radius:8px;color:#FFF8F0;font-size:20px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.sb-section{font-size:10px;font-weight:700;letter-spacing:1.2px;color:#5A4A38;padding:12px 14px 4px;text-transform:uppercase;}
.folder-list{flex:1;overflow-y:auto;padding-bottom:8px;}
.folder-item{display:flex;align-items:center;gap:8px;padding:9px 10px;cursor:pointer;font-size:13px;color:var(--sb-text);border-radius:10px;margin:2px 8px;transition:background .15s;}
.folder-item:hover{background:rgba(255,255,255,0.06);}
.folder-item.active{background:var(--sb-active);color:#FFF8F0;font-weight:600;}
.folder-icon-wrap{width:26px;height:26px;background:rgba(237,229,216,0.12);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.folder-item.active .folder-icon-wrap{background:rgba(255,255,255,0.18);}
.folder-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.folder-count{font-size:11px;background:rgba(255,255,255,0.1);border-radius:10px;padding:1px 7px;flex-shrink:0;}
.folder-item.active .folder-count{background:rgba(255,255,255,0.2);}
.folder-edit-btns{display:none;gap:2px;}
.folder-item:hover .folder-edit-btns{display:flex;}
.folder-edit-btn{background:none;border:none;cursor:pointer;padding:3px;border-radius:5px;opacity:.6;display:flex;align-items:center;justify-content:center;}
.folder-edit-btn:hover{opacity:1;background:rgba(255,255,255,0.1);}
.sb-footer{padding:10px 12px 18px;border-top:1px solid rgba(255,255,255,0.06);}
.btn-new-folder{width:100%;background:rgba(255,255,255,0.05);border:1px dashed rgba(255,255,255,0.12);border-radius:10px;padding:9px;font-size:12px;cursor:pointer;color:var(--sb-text);text-align:center;transition:all .15s;}
.btn-new-folder:hover{border-color:var(--accent2);color:#fff;}
.cloud-sync-box{margin-top:8px;background:rgba(255,255,255,0.05);border-radius:10px;padding:10px;}
.cloud-label{color:#C8B89A;font-size:11px;font-weight:700;margin-bottom:7px;letter-spacing:.5px;}
.cloud-pin{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:7px 10px;font-size:13px;color:#FFF8F0;outline:none;margin-bottom:7px;font-family:inherit;}
.cloud-btns{display:flex;gap:6px;}
.cloud-btn{flex:1;border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:700;padding:8px 2px;cursor:pointer;}
.cloud-btn.up{background:#8B6340;}
.cloud-btn.down{background:#4A7A6A;}
#syncMsg{text-align:center;font-size:12px;font-weight:500;margin-top:6px;display:none;}

/* ── MAIN PANEL ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100dvh;overflow:hidden;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px 12px;flex-shrink:0;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;}
.header-left{display:flex;align-items:center;gap:8px;min-width:0;}
.btn-back{display:none;background:none;border:none;cursor:pointer;color:var(--accent);font-size:14px;font-weight:600;align-items:center;gap:4px;flex-shrink:0;padding:0;}
.header-title{font-size:16px;font-weight:800;color:var(--title-color);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-add{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:20px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;box-shadow:0 2px 8px rgba(139,99,64,.3);}
.search-wrap{position:relative;}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;display:flex;align-items:center;}
.search-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:8px 10px 8px 32px;font-size:14px;background:var(--bg);color:var(--text);outline:none;font-family:inherit;}
.search-input:focus{border-color:var(--accent);}
.tag-bar{padding:8px 16px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.tag-bar::-webkit-scrollbar{display:none;}
.tag-chip{flex-shrink:0;background:var(--tag-bg);border:1.5px solid var(--border);border-radius:20px;padding:4px 11px;font-size:12px;cursor:pointer;color:var(--muted);white-space:nowrap;font-weight:500;}
.tag-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.cards-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.count{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.3px;text-transform:uppercase;padding:6px 16px 0;flex-shrink:0;}

/* ── CARDS ── */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .15s,box-shadow .15s;}
.card:hover{border-color:var(--accent2);box-shadow:0 3px 12px rgba(139,99,64,.1);}
.card-title-bar{background:var(--title-bg);padding:9px 10px 9px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid var(--border);}
.card-title{font-size:13px;font-weight:700;color:var(--title-color);line-height:1.3;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-actions{display:flex;gap:4px;flex-shrink:0;}
.icon-btn{background:rgba(255,255,255,.75);border:1.5px solid var(--border);cursor:pointer;width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s;}
.icon-btn:hover{transform:scale(1.08);}
.icon-btn.move:hover{background:#F0E8D5;border-color:var(--accent2);}
.icon-btn.edit:hover{background:#D8EAF0;border-color:#7AAFC0;}
.icon-btn.del:hover{background:#F5DADA;border-color:#C07A7A;}
.card-inner{padding:11px 14px 13px;min-height:20px;}
.card-body{font-size:14px;line-height:1.6;color:var(--text);white-space:pre-wrap;word-break:break-all;overflow:hidden;max-height:112px;display:block;}
.card-footer{margin-top:9px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.card-tag{background:var(--accent-light);color:var(--accent);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;}
.card-folder-badge{background:var(--tag-bg);color:var(--muted);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:500;display:flex;align-items:center;gap:4px;}
.copy-flash{position:absolute;inset:0;border-radius:14px;background:rgba(196,149,106,.14);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--accent);opacity:0;pointer-events:none;transition:opacity .15s;backdrop-filter:blur(2px);}
.copy-flash.show{opacity:1;}
.empty{text-align:center;padding:56px 16px;color:var(--muted);font-size:14px;line-height:1.8;}
.empty-icon{font-size:40px;margin-bottom:10px;}

/* ── MODALS ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(30,20,10,.45);z-index:500;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:22px 18px 34px;width:100%;max-width:600px;max-height:92dvh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:16px;font-weight:800;color:var(--title-color);margin-bottom:16px;}
label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;margin-top:14px;letter-spacing:.5px;text-transform:uppercase;}
input[type="text"],textarea,select{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;resize:vertical;appearance:none;transition:border-color .15s;}
input[type="text"]:focus,textarea:focus,select:focus{border-color:var(--accent);}
textarea{min-height:220px;}
.tag-input-row{display:flex;gap:6px;}
.tag-input-row input{flex:1;}
.btn-tag-add{background:var(--tag-bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;cursor:pointer;flex-shrink:0;color:var(--accent);font-weight:600;}
.modal-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;}
.modal-tag{background:var(--accent-light);color:var(--accent);border-radius:6px;padding:4px 9px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;}
.modal-tag .rm{cursor:pointer;opacity:.6;font-size:13px;}
.tag-suggestions{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;}
.tag-suggest-chip{background:var(--tag-bg);border:1.5px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;cursor:pointer;color:var(--muted);font-weight:500;}
.tag-suggest-chip:hover{border-color:var(--accent);color:var(--accent);}
.modal-footer{display:flex;gap:8px;margin-top:22px;}
.btn-save{flex:1;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;}
.btn-cancel{background:var(--tag-bg);color:var(--muted);border:none;border-radius:12px;padding:13px 20px;font-size:15px;cursor:pointer;font-weight:600;}
.move-folder-list{display:flex;flex-direction:column;gap:5px;margin-top:4px;}
.move-folder-btn{width:100%;text-align:left;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--text);font-weight:500;}
.move-folder-btn:hover,.move-folder-btn.current{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.move-folder-btn.current{font-weight:700;}

/* ── MOBILE ── */
@media(max-width:600px){
  body{overflow:hidden;}

  /* デフォルト：横並び */
  .sidebar{
    width:140px;min-width:140px;flex-shrink:0;
    transition:width .25s,transform .25s;
  }
  .sb-title{font-size:13px;}
  .sb-header{padding:12px 8px 8px;}
  .sb-section{font-size:9px;padding:8px 8px 4px;}
  .folder-item{padding:7px 6px;font-size:11px;gap:5px;}
  .folder-icon-wrap{width:20px;height:20px;}
  .folder-name{font-size:11px;}
  .folder-count{font-size:10px;padding:1px 5px;}
  .sb-footer{padding:6px 6px 12px;}
  .btn-new-folder{font-size:10px;padding:7px;}
  .cloud-sync-box{padding:7px;margin-top:6px;}
  .cloud-label{font-size:9px;margin-bottom:5px;}
  .cloud-pin{font-size:11px;padding:5px 6px;margin-bottom:5px;}
  .cloud-btn{font-size:9px;padding:6px 1px;}
  .main{flex:1;min-width:0;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}
  .cards-area{flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;}
  .btn-back{display:none;}

  /* フォルダ選択後：サイドバー非表示、メイン全画面 */
  body.folder-selected .sidebar{width:0;min-width:0;overflow:hidden;transition:width .25s;}
  body.folder-selected .main{width:100vw;flex:none;transition:width .25s;}
  body.folder-selected .btn-back{display:flex;}
}
</style>
</head>
<body>

<!-- SVG Icons -->
<svg style="display:none" xmlns="http://www.w3.org/2000/svg"><defs>
  <symbol id="i-all" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="14" width="18" height="7" rx="1.5"/><rect x="5" y="8" width="14" height="7" rx="1.5"/><rect x="7" y="3" width="10" height="6" rx="1.5"/></symbol>
  <symbol id="i-inbox" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 4 20 20 20 20 12"/><path d="M4 12h4l2 3h4l2-3h4"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="13"/></symbol>
  <symbol id="i-folder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7.5C3 6.67 3.67 6 4.5 6H9.5l2 2.5H19.5c.83 0 1.5.67 1.5 1.5v8c0 .83-.67 1.5-1.5 1.5h-15C3.67 18 3 17.33 3 16.5V7.5z"/></symbol>
  <symbol id="i-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></symbol>
  <symbol id="i-move" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><polyline points="12 5 19 12 12 19"/></symbol>
  <symbol id="i-pencil" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></symbol>
  <symbol id="i-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></symbol>
</defs></svg>

<!-- SIDEBAR (Page A on mobile) -->
<div class="sidebar" id="sidebar">
  <div class="sb-header">
    <span class="sb-title">memo</span>
    <button class="sb-add-btn" onclick="openMemoModal()">＋</button>
  </div>
  <div class="sb-section">フォルダ</div>
  <div class="folder-list" id="folderList"></div>
  <div class="sb-footer">
    <button class="btn-new-folder" onclick="newFolder()">＋ フォルダを追加</button>
    <div class="cloud-sync-box">
      <div class="cloud-label">☁️ クラウド同期</div>
      <input class="cloud-pin" id="syncPinInput" type="password" placeholder="同期PINを入力">
      <div class="cloud-btns">
        <button class="cloud-btn up" onclick="doCloudUpload()">⬆️ 端末→クラウド</button>
        <button class="cloud-btn down" onclick="doCloudDownload()">⬇️ クラウド→端末</button>
      </div>
      <div id="syncMsg"></div>
    </div>
  </div>
</div>

<!-- MAIN (Page B on mobile) -->
<div class="main" id="main">
  <header>
    <div class="header-top">
      <div class="header-left">
        <button class="btn-back" id="btnBack" onclick="goBack()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 5L8 12L15 19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          フォルダ
        </button>
        <div class="header-title" id="headerTitle">すべて</div>
      </div>
      <button class="btn-add" onclick="openMemoModal()">＋ 追加</button>
    </div>
    <div class="search-wrap">
      <div class="search-icon"><svg width="15" height="15" style="color:#9A8E7A"><use href="#i-search"/></svg></div>
      <input class="search-input" type="text" placeholder="検索..." id="searchInput" oninput="renderCards()">
    </div>
  </header>
  <div class="tag-bar" id="tagBar"></div>
  <div class="count" id="countLabel"></div>
  <div class="cards-area" id="cards"></div>
</div>

<!-- Memo Modal -->
<div class="modal-overlay" id="memoOverlay" onclick="overlayClick(event,'memoOverlay')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="memoModalTitle">メモを追加</div>
    <label>タイトル（任意）</label>
    <input type="text" id="mTitle" placeholder="例：退院指導文">
    <label>本文</label>
    <textarea id="mBody" placeholder="コピーしたいテキストを入力..."></textarea>
    <label>フォルダ</label>
    <select id="mFolder"></select>
    <label>タグ</label>
    <div class="tag-input-row">
      <input type="text" id="mTagInput" placeholder="タグを入力" onkeydown="tagKeydown(event)">
      <button class="btn-tag-add" onclick="addTag()">追加</button>
    </div>
    <div class="tag-suggestions" id="tagSuggestions"></div>
    <div class="modal-tags" id="modalTags"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeMemoModal()">キャンセル</button>
      <button class="btn-save" onclick="saveMemo()">保存</button>
    </div>
  </div>
</div>

<!-- Move Modal -->
<div class="modal-overlay" id="moveOverlay" onclick="overlayClick(event,'moveOverlay')">
  <div class="modal" style="max-width:380px">
    <div class="modal-handle"></div>
    <div class="modal-title">フォルダを移動</div>
    <div class="move-folder-list" id="moveFolderList"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeMoveModal()">キャンセル</button>
    </div>
  </div>
</div>

<!-- Folder Name Modal -->
<div class="modal-overlay" id="folderNameOverlay" onclick="overlayClick(event,'folderNameOverlay')">
  <div class="modal" style="max-width:380px">
    <div class="modal-handle"></div>
    <div class="modal-title" id="folderNameTitle">フォルダ名</div>
    <label>フォルダ名</label>
    <input type="text" id="folderNameInput" placeholder="例：カルテ文言" onkeydown="folderNameKeydown(event)">
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeFolderNameModal()">キャンセル</button>
      <button class="btn-save" onclick="saveFolderName()">保存</button>
    </div>
  </div>
</div>

<script>
const MEMO_KEY='copimemo_memos_v2', FOLDER_KEY='copimemo_folders_v2';
let memos=[], folders=[];
let editMemoId=null, currentTags=[];
let activeTagFilter=null, activeFolderId=null;
let movingMemoId=null, folderEditId=null;
let isMobile=()=>window.innerWidth<=600;

// ── Mobile navigation ──
function goFolder(id){
  activeFolderId=id;
  activeTagFilter=null;
  renderAll();
  if(window.innerWidth<=600){
    document.body.classList.add('folder-selected');
  }
}

function goBack(){
  document.body.classList.remove('folder-selected');
}

// Swipe right to go back
(function(){
  let startX=0,startY=0;
  document.getElementById('main').addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;},{passive:true});
  document.getElementById('main').addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-startX;
    const dy=Math.abs(e.changedTouches[0].clientY-startY);
    if(dx>60&&dy<40&&window.innerWidth<=600) goBack();
  },{passive:true});
})();

function ico(id,size=16,color='currentColor'){
  return `<svg width="${size}" height="${size}" style="color:${color};display:block;flex-shrink:0"><use href="#${id}"/></svg>`;
}
function load(){
  try{memos=JSON.parse(localStorage.getItem(MEMO_KEY))||[];}catch{memos=[];}
  try{folders=JSON.parse(localStorage.getItem(FOLDER_KEY))||[];}catch{folders=[];}
}
function persist(){
  localStorage.setItem(MEMO_KEY,JSON.stringify(memos));
  localStorage.setItem(FOLDER_KEY,JSON.stringify(folders));
}

function allTagsInView(){
  const set=new Set();
  const src=activeFolderId===null?memos:activeFolderId==='uncategorized'?memos.filter(m=>!m.folderId):memos.filter(m=>m.folderId===activeFolderId);
  src.forEach(m=>(m.tags||[]).forEach(t=>set.add(t)));
  return [...set].sort();
}

function renderAll(){renderSidebar();renderTagBar();renderCards();}

function renderSidebar(){
  const list=document.getElementById('folderList');list.innerHTML='';
  list.appendChild(makeFolderItem(null,'i-all','すべて',memos.length));
  const noF=memos.filter(m=>!m.folderId).length;
  if(noF>0||activeFolderId==='uncategorized')
    list.appendChild(makeFolderItem('uncategorized','i-inbox','未分類',noF));
  folders.forEach(f=>list.appendChild(makeFolderItem(f.id,'i-folder',f.name,memos.filter(m=>m.folderId===f.id).length,f.id)));
}

function makeFolderItem(id,iconId,name,count,editableId){
  const div=document.createElement('div');
  div.className='folder-item'+(activeFolderId===id?' active':'');
  div.onclick=()=>goFolder(id);
  const c=activeFolderId===id?'#FFF8F0':'#C8B89A';
  div.innerHTML=`<div class="folder-icon-wrap">${ico(iconId,14,c)}</div><span class="folder-name">${name}</span><span class="folder-count">${count}</span>`;
  if(editableId){
    const acts=document.createElement('div');acts.className='folder-edit-btns';
    const rb=document.createElement('button');rb.className='folder-edit-btn';
    rb.innerHTML=ico('i-pencil',13,'#C8B89A');rb.onclick=e=>{e.stopPropagation();openFolderNameModal(editableId);};
    const db=document.createElement('button');db.className='folder-edit-btn';
    db.innerHTML=ico('i-trash',13,'#C8B89A');db.onclick=e=>{e.stopPropagation();deleteFolder(editableId);};
    acts.append(rb,db);div.appendChild(acts);
  }
  return div;
}

function renderTagBar(){
  const tags=allTagsInView();const bar=document.getElementById('tagBar');bar.innerHTML='';
  if(tags.length===0){bar.style.display='none';return;}bar.style.display='flex';
  const all=document.createElement('div');all.className='tag-chip'+(activeTagFilter===null?' active':'');
  all.textContent='すべて';all.onclick=()=>{activeTagFilter=null;renderTagBar();renderCards();};
  bar.appendChild(all);
  tags.forEach(t=>{
    const chip=document.createElement('div');chip.className='tag-chip'+(activeTagFilter===t?' active':'');
    chip.textContent='# '+t;chip.onclick=()=>{activeTagFilter=activeTagFilter===t?null:t;renderTagBar();renderCards();};
    bar.appendChild(chip);
  });
}

function getFilteredMemos(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  return memos.filter(m=>{
    if(activeFolderId===null){}
    else if(activeFolderId==='uncategorized'){if(m.folderId)return false;}
    else{if(m.folderId!==activeFolderId)return false;}
    if(activeTagFilter&&!(m.tags||[]).includes(activeTagFilter))return false;
    if(q&&!(m.title||'').toLowerCase().includes(q)&&!(m.body||'').toLowerCase().includes(q))return false;
    return true;
  });
}

function renderCards(){
  const name=activeFolderId===null?'すべて':activeFolderId==='uncategorized'?'未分類':(folders.find(f=>f.id===activeFolderId)?.name||'');
  document.getElementById('headerTitle').textContent=name;
  const list=getFilteredMemos();
  document.getElementById('countLabel').textContent=list.length+'件';
  const container=document.getElementById('cards');container.innerHTML='';
  if(list.length===0){
    container.innerHTML='<div class="empty"><div class="empty-icon">📋</div>メモがありません<br>「＋ 追加」から登録してください</div>';return;
  }
  list.forEach(m=>{
    const card=document.createElement('div');card.className='card';
    const tb=document.createElement('div');tb.className='card-title-bar';
    const ttl=document.createElement('div');ttl.className='card-title';ttl.textContent=m.title||'無題';
    const acts=document.createElement('div');acts.className='card-actions';
    const mb=document.createElement('button');mb.className='icon-btn move';mb.title='移動';
    mb.innerHTML=ico('i-move',14,'#9A8E7A');mb.onclick=e=>{e.stopPropagation();openMoveModal(m.id);};
    const eb=document.createElement('button');eb.className='icon-btn edit';eb.title='編集';
    eb.innerHTML=ico('i-pencil',14,'#6A9AB0');eb.onclick=e=>{e.stopPropagation();openMemoModal(m.id);};
    const db=document.createElement('button');db.className='icon-btn del';db.title='削除';
    db.innerHTML=ico('i-trash',14,'#C07A7A');db.onclick=e=>{e.stopPropagation();deleteMemo(m.id);};
    acts.append(mb,eb,db);tb.append(ttl,acts);
    const inner=document.createElement('div');inner.className='card-inner';
    inner.style.cssText='padding:11px 14px 13px;min-height:40px;';
    if(m.body){
      const body=document.createElement('div');
      body.style.cssText='font-size:14px;line-height:1.6;color:#3A2E1E;white-space:pre-wrap;word-break:break-all;overflow:hidden;max-height:112px;display:block;';
      body.textContent=m.body;
      inner.appendChild(body);
    }
    const footer=document.createElement('div');footer.className='card-footer';
    if(activeFolderId===null&&m.folderId){
      const fb=document.createElement('div');fb.className='card-folder-badge';
      fb.innerHTML=ico('i-folder',12,'#9A8E7A')+folderName(m.folderId);footer.appendChild(fb);
    }
    (m.tags||[]).forEach(t=>{const tag=document.createElement('div');tag.className='card-tag';tag.textContent='# '+t;footer.appendChild(tag);});
    if(footer.children.length>0)inner.appendChild(footer);
    const flash=document.createElement('div');flash.className='copy-flash';flash.textContent='コピーしました ✓';
    card.append(tb,inner,flash);
    card.onclick=()=>{
      navigator.clipboard.writeText(m.body||'').then(()=>{flash.classList.add('show');setTimeout(()=>flash.classList.remove('show'),800);})
      .catch(()=>{const ta=document.createElement('textarea');ta.value=m.body||'';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);flash.classList.add('show');setTimeout(()=>flash.classList.remove('show'),800);});
    };
    container.appendChild(card);
  });
}

function folderName(id){if(!id)return '未分類';return folders.find(f=>f.id===id)?.name||'未分類';}
function newFolder(){openFolderNameModal(null);}

function deleteFolder(id){
  if(!confirm('フォルダを削除しますか？\nメモは未分類に移動されます'))return;
  folders=folders.filter(f=>f.id!==id);memos.forEach(m=>{if(m.folderId===id)m.folderId=null;});
  if(activeFolderId===id)activeFolderId=null;persist();renderAll();
}

function openFolderNameModal(id){
  folderEditId=id;
  document.getElementById('folderNameTitle').textContent=id?'フォルダ名を変更':'新しいフォルダ';
  document.getElementById('folderNameInput').value=id?(folders.find(f=>f.id===id)?.name||''):'';
  document.getElementById('folderNameOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('folderNameInput').focus(),100);
}
function closeFolderNameModal(){document.getElementById('folderNameOverlay').classList.remove('open');folderEditId=null;}
function folderNameKeydown(e){if(e.key==='Enter')saveFolderName();}
function saveFolderName(){
  const name=document.getElementById('folderNameInput').value.trim();if(!name)return;
  if(folderEditId){const f=folders.find(x=>x.id===folderEditId);if(f)f.name=name;}
  else folders.push({id:'f'+Date.now(),name});
  persist();closeFolderNameModal();renderAll();
}

function openMoveModal(memoId){
  movingMemoId=memoId;const m=memos.find(x=>x.id===memoId);const cur=m?.folderId||null;
  const list=document.getElementById('moveFolderList');list.innerHTML='';
  const ub=document.createElement('button');ub.className='move-folder-btn'+(cur===null?' current':'');
  ub.innerHTML=ico('i-inbox',18,'#8B6340')+'未分類';ub.onclick=()=>doMove(null);list.appendChild(ub);
  folders.forEach(f=>{
    const btn=document.createElement('button');btn.className='move-folder-btn'+(cur===f.id?' current':'');
    btn.innerHTML=ico('i-folder',18,'#8B6340')+f.name;btn.onclick=()=>doMove(f.id);list.appendChild(btn);
  });
  document.getElementById('moveOverlay').classList.add('open');
}
function doMove(folderId){const m=memos.find(x=>x.id===movingMemoId);if(m)m.folderId=folderId;persist();closeMoveModal();renderAll();}
function closeMoveModal(){document.getElementById('moveOverlay').classList.remove('open');movingMemoId=null;}

function openMemoModal(id){
  editMemoId=id||null;currentTags=[];
  document.getElementById('mTitle').value='';document.getElementById('mBody').value='';document.getElementById('mTagInput').value='';
  document.getElementById('memoModalTitle').textContent=id?'メモを編集':'メモを追加';
  const sel=document.getElementById('mFolder');sel.innerHTML='<option value="">未分類</option>';
  folders.forEach(f=>{const o=document.createElement('option');o.value=f.id;o.textContent=f.name;sel.appendChild(o);});
  if(id){const m=memos.find(x=>x.id===id);if(m){document.getElementById('mTitle').value=m.title||'';document.getElementById('mBody').value=m.body||'';sel.value=m.folderId||'';currentTags=[...(m.tags||[])];}}
  else if(activeFolderId&&activeFolderId!=='uncategorized')sel.value=activeFolderId;
  renderModalTags();renderTagSuggestions();
  document.getElementById('memoOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('mBody').focus(),100);
}
function closeMemoModal(){document.getElementById('memoOverlay').classList.remove('open');editMemoId=null;currentTags=[];}
function saveMemo(){
  const title=document.getElementById('mTitle').value.trim();
  const body=document.getElementById('mBody').value.trim();
  const folderId=document.getElementById('mFolder').value||null;
  if(!title&&!body){document.getElementById('mBody').focus();return;}
  if(editMemoId){const m=memos.find(x=>x.id===editMemoId);if(m){m.title=title;m.body=body;m.tags=[...currentTags];m.folderId=folderId;}}
  else memos.unshift({id:Date.now().toString(),title,body,tags:[...currentTags],folderId});
  persist();closeMemoModal();renderAll();
}
function deleteMemo(id){if(!confirm('削除しますか？'))return;memos=memos.filter(m=>m.id!==id);persist();renderAll();}
function tagKeydown(e){if(e.key==='Enter'){e.preventDefault();addTag();}}
function addTag(){
  const input=document.getElementById('mTagInput');const val=input.value.trim();
  if(!val||currentTags.includes(val)){input.value='';return;}
  currentTags.push(val);input.value='';renderModalTags();renderTagSuggestions();
}
function removeTag(t){currentTags=currentTags.filter(x=>x!==t);renderModalTags();}
function renderModalTags(){
  const div=document.getElementById('modalTags');div.innerHTML='';
  currentTags.forEach(t=>{
    const chip=document.createElement('div');chip.className='modal-tag';
    chip.innerHTML=`# ${t} <span class="rm" onclick="removeTag('${t.replace(/'/g,"\\'")}')">×</span>`;
    div.appendChild(chip);
  });
}
function renderTagSuggestions(){
  const all=new Set();memos.forEach(m=>(m.tags||[]).forEach(t=>all.add(t)));
  const div=document.getElementById('tagSuggestions');div.innerHTML='';
  [...all].filter(t=>!currentTags.includes(t)).forEach(t=>{
    const chip=document.createElement('div');chip.className='tag-suggest-chip';chip.textContent='# '+t;
    chip.onclick=()=>{if(!currentTags.includes(t)){currentTags.push(t);renderModalTags();renderTagSuggestions();}};
    div.appendChild(chip);
  });
}
function overlayClick(e,id){
  if(e.target!==document.getElementById(id))return;
  if(id==='memoOverlay')closeMemoModal();
  else if(id==='moveOverlay')closeMoveModal();
  else if(id==='folderNameOverlay')closeFolderNameModal();
}

// ── クラウド同期 ──
const SYNC_URL='/api/sync';
function showSyncMsg(msg,ok=true){
  const el=document.getElementById('syncMsg');
  el.textContent=msg;el.style.color=ok?'#6BAA7A':'#C07A7A';el.style.display='block';
  setTimeout(()=>el.style.display='none',3000);
}
async function doCloudUpload(){
  const pin=document.getElementById('syncPinInput').value.trim();
  if(!pin){showSyncMsg('PINを入力してください',false);return;}
  try{
    const r=await fetch(SYNC_URL,{method:'POST',headers:{'Content-Type':'application/json','x-sync-pin':pin},body:JSON.stringify({memos,folders,exportedAt:Date.now()})});
    const j=await r.json();
    if(r.ok)showSyncMsg('✅ クラウドに保存しました');
    else showSyncMsg('❌ '+(j.error||'エラー'),false);
  }catch{showSyncMsg('❌ 通信エラー',false);}
}
async function doCloudDownload(){
  const pin=document.getElementById('syncPinInput').value.trim();
  if(!pin){showSyncMsg('PINを入力してください',false);return;}
  try{
    const r=await fetch(SYNC_URL,{headers:{'x-sync-pin':pin}});
    if(!r.ok){const j=await r.json();showSyncMsg('❌ '+(j.error||'エラー'),false);return;}
    const p=await r.json();
    const m=p.memos||[],f=p.folders||[];
    if(!Array.isArray(m)||m.length===0){showSyncMsg('クラウドにデータがありません',false);return;}
    memos=m;if(f.length)folders=f;
    persist();renderAll();
    showSyncMsg('✅ '+m.length+'件を同期しました');
  }catch{showSyncMsg('❌ 通信エラー',false);}
}

load();renderAll();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
